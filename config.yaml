project:
  name: yeniBot
  package: yenibot
  phase: 1
  random_seed: 42
  deterministic: true

paths:
  drive_base: /content/drive/MyDrive/yeniBot
  data_dir: /content/drive/MyDrive/yeniBot/data
  checkpoint_dir: /content/drive/MyDrive/yeniBot/checkpoints
  local_data_dir: data
  local_checkpoint_dir: checkpoints

binance:
  base_url: https://fapi.binance.com
  vision_base_url: https://s3-ap-northeast-1.amazonaws.com/data.binance.vision
  data_source: auto
  symbol: BTCUSDT
  primary_interval: 1h
  htf_interval: 4h
  intrabar_intervals: [15m]
  futures_metrics:
    enabled: true
    filename: btc_futures_metrics.parquet
    request_sleep_seconds: 0.0
  funding_rates:
    enabled: true
    filename: btc_funding_rates.parquet
    request_sleep_seconds: 0.15
  start_date: "2022-01-01"
  end_date: null
  limit: 1500
  request_sleep_seconds: 0.15
  max_gap_multiplier: 2
  intrabar_max_gap_multiplier: 8
  zero_volume_policy: drop

features:
  active_profile: baseline_plus_4h_bounded_whale_no_4h_tier1
  exclude_columns: []
  exclude_patterns: []
  profiles:
    all:
      description: Use every feature that survives leakage and stationarity filters.
      include_patterns: ["*"]
      exclude_patterns: []
    baseline_40:
      description: Original stationarity-safe Tier 1-3 feature set without order-flow v2.
      include_patterns:
        - "*taker_buy_ratio"
        - "*taker_sell_ratio"
        - "*true_cvd_zscore"
        - "*true_cvd_delta_norm"
        - "*cvd_cumulative_rate_norm"
        - "*buy_sell_imbalance_ema"
        - "*volume_log_zscore"
        - "*volume_denoised_log_zscore"
        - "*close_denoised_log_return"
        - "*log_return"
        - "*realized_vol_14"
        - "*gk_vol_14"
        - "*atr_14_pct"
        - "*adx_14"
        - "*vwap_dist_atr"
        - "*vpt_zscore"
        - "*vol_per_trade_log_zscore"
        - "*whale_buy_flag"
        - "*whale_sell_flag"
        - "*large_trade_ratio"
      exclude_patterns:
        - "*taker_imbalance*"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_bounded_v2:
      description: Baseline plus bounded taker-imbalance v2 features on 1H and 4H.
      inherit: baseline_40
      include_patterns:
        - "*taker_imbalance"
        - "*taker_buy_ratio_zscore"
        - "*taker_buy_ratio_delta"
        - "*taker_imbalance_slope"
        - "*taker_imbalance_mean_*"
      exclude_patterns:
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale:
      description: Conservative next run; baseline plus only 4H bounded order-flow v2 and whale context.
      inherit: baseline_40
      include_patterns:
        - "4h_taker_imbalance"
        - "4h_taker_buy_ratio_zscore"
        - "4h_taker_buy_ratio_delta"
        - "4h_taker_imbalance_slope"
        - "4h_taker_imbalance_mean_*"
        - "4h_vpt_zscore"
        - "4h_vol_per_trade_log_zscore"
        - "4h_whale_buy_flag"
        - "4h_whale_sell_flag"
        - "4h_large_trade_ratio"
      exclude_patterns:
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "*cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1:
      description: Keep the bounded 4H v2 and whale context, but remove the harmful inherited 4H Tier 1 family.
      inherit: baseline_plus_4h_bounded_whale
      include_patterns: []
      exclude_patterns:
        - "4h_taker_buy_ratio"
        - "4h_taker_sell_ratio"
        - "4h_true_cvd_zscore"
        - "4h_true_cvd_delta_norm"
        - "4h_cvd_cumulative_rate_norm"
        - "4h_buy_sell_imbalance_ema"
        - "*orderflow_efficiency*"
        - "*absorption_pressure*"
        - "*cvd_price_divergence*"
        - "cvd_pressure*"
        - "4h_cvd_pressure*"
        - "*large_trade_pressure*"
        - "*_stable_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_slow_4h_bounded_flow:
      description: Baseline control without slower 12/24-bar 4H taker-imbalance means; tests bad-fold bounded-flow drift.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_taker_imbalance_mean_12"
        - "4h_taker_imbalance_mean_24"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_bounded_flow:
      description: Baseline control without all 4H bounded taker-flow context; isolates whale/structure backbone quality.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_taker_imbalance"
        - "4h_taker_buy_ratio_zscore"
        - "4h_taker_buy_ratio_delta"
        - "4h_taker_imbalance_slope"
        - "4h_taker_imbalance_mean_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_large_trade_ratio:
      description: Baseline control with only raw 4H large-trade ratio removed after repeated bad-fold shifts.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_large_trade_ratio"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_whale_zscores:
      description: Baseline control removing smoother 4H VPT and volume-per-trade z-scores while keeping sparse whale flags.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_vpt_zscore"
        - "4h_vol_per_trade_log_zscore"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility:
      description: Baseline control removing raw 4H volatility magnitude levels while keeping directional and VWAP context.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "4h_realized_vol_14"
        - "4h_gk_vol_14"
        - "4h_atr_14_pct"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_slow_4h_bounded_flow:
      description: Stability candidate removing raw 4H pure volatility plus slow 12/24-bar 4H bounded flow.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility
      append_exclude_patterns:
        - "4h_taker_imbalance_mean_12"
        - "4h_taker_imbalance_mean_24"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_4h_bounded_flow:
      description: Stability candidate removing raw 4H pure volatility plus all 4H bounded taker-flow context.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility
      append_exclude_patterns:
        - "4h_taker_imbalance"
        - "4h_taker_buy_ratio_zscore"
        - "4h_taker_buy_ratio_delta"
        - "4h_taker_imbalance_slope"
        - "4h_taker_imbalance_mean_*"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility:
      description: Stability candidate removing raw 4H pure volatility and local 1H volatility magnitude levels.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility
      append_exclude_patterns:
        - "realized_vol_14"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_stable_score_margin_loss:
      description: "Training-objective candidate: same feature set as the current control, but adds a small pairwise label-margin auxiliary loss to target bad-fold score-separation compression without changing labels, model architecture, or holdout policy."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      config_overrides:
        training:
          loss:
            label_margin_weight: 0.05
            label_margin: 0.25
    baseline_control_plus_futures_context:
      description: Broad historical futures-context profile from run 20260524_072602; kept for diagnostics only because it improved holdout top-10 but damaged CV stability.
      inherit: baseline_plus_4h_bounded_whale
      include_patterns:
