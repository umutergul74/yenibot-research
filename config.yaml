      append_exclude_patterns:
        - "cvd_cumulative_rate_norm"
    baseline_stable_no_slow_4h_bounded_flow:
      description: Stability control without slow 12/24-bar aligned 4H taker-imbalance means, keeping faster bounded flow context.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      append_exclude_patterns:
        - "4h_taker_imbalance_mean_12"
        - "4h_taker_imbalance_mean_24"
    baseline_stable_no_4h_taker_mean12:
      description: "Feature-drift forensic candidate: remove only the 12-bar aligned 4H taker-imbalance mean that showed bad-fold signal reversal; keep 24-bar context to avoid repeating the rejected broad slow-flow ablation."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      append_exclude_patterns:
        - "4h_taker_imbalance_mean_12"
    baseline_stable_no_4h_large_trade_ratio:
      description: "Feature-drift forensic candidate: remove only raw aligned 4H large_trade_ratio after bad-fold distribution drift; keep 4H VPT z-score, volume-per-trade z-score, and sparse whale flags."
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
      append_exclude_patterns:
        - "4h_large_trade_ratio"
    baseline_stable_no_4h_taker_mean12_no_4h_large_trade_ratio:
      description: "Combined forensic candidate removing the two current bad-fold suspects: 4H taker-imbalance mean 12 and raw 4H large-trade ratio; keep slower 24-bar flow and other whale context."
      inherit: baseline_stable_no_4h_taker_mean12
      append_exclude_patterns:
        - "4h_large_trade_ratio"
    baseline_stable_plus_4h_taker_mean12_ltr_context:
      description: "Targeted conditional context profile from run 20260526_185416: keep the control backbone and add only stable 4H taker-mean12 / large-trade-ratio context plus their narrow conditional interactions."
      inherit: baseline_stable_allow_intrahour_stable
      include_patterns:
        - "4h_taker_imbalance_mean_12_stable_rank"
        - "4h_large_trade_ratio_stable_rank"
        - "4h_taker_mean12_x_ltr_rank_signed"
        - "4h_taker_mean12_x_ltr_rank_high"
        - "4h_taker_mean12_x_ltr_rank_low"
    baseline_stable_plus_4h_taker_mean12_ltr_context_no_raw_ltr:
      description: "Conditional context profile that removes raw 4H large_trade_ratio while preserving stable large-trade context and conditional taker-flow interactions."
      inherit: baseline_stable_plus_4h_taker_mean12_ltr_context
      append_exclude_patterns:
        - "4h_large_trade_ratio"
