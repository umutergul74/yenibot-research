      baseline_stable_plus_15m_absorption_efficiency_combo:
        reason: "Bundle 20260513_182426: absorption plus efficiency combo had weak triage mean IC, top-10 lift below 1.0, and unstable fold deltas."
  seed_audit:
    enabled: true
    profiles:
      - baseline_plus_4h_bounded_whale_no_4h_tier1_no_4h_pure_volatility_no_1h_pure_volatility
    seeds: [42, 43, 44]
    fold_ids: [0, 13, 21, 29, 32, 35, 39, 41]
  promotion_gates:
