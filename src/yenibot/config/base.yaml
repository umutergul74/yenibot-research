      baseline_stable_plus_4h_flow_atr_interactions:
        reason: "Bundle 20260510_172332: broad 4H ATR flow interactions showed weak mean IC and failed top-decile/positive-lift gates."
      baseline_stable_no_1h_cvd_rate:
