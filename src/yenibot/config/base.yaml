      baseline_stable_no_slow_4h_bounded_flow:
        reason: "Bundle 20260513_070515: removing slow 4H bounded-flow means reduced triage mean IC to 0.0290; slow 4H context remains useful."
      baseline_stable_no_slow_4h_bounded_flow_no_1h_cvd_rate:
