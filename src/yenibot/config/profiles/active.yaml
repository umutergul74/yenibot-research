      append_exclude_patterns:
        - "4h_large_trade_pressure_12_stable_zscore"
        - "4h_large_trade_pressure_12_stable_rank"
    baseline_no_4h_tier1_4h_large_trade_pressure_long_no_4h_pure_volatility_no_4h_whale_zscores:
