      inherit: baseline_no_4h_tier1_4h_large_trade_pressure_long
      append_exclude_patterns:
        - "4h_large_trade_pressure_12_stable_zscore"
    baseline_no_4h_tier1_4h_large_trade_pressure_long_no_12_pressure_rank:
      description: Champion profile with only the 12-bar 4H pressure rank removed; keeps the 12-bar z-score and full 24-bar pressure pair.
      inherit: baseline_no_4h_tier1_4h_large_trade_pressure_long
      append_exclude_patterns:
