    baseline_no_4h_tier1_4h_large_trade_pressure_long_12_pressure_tanh_replacement:
      description: Replace the noisy 12-bar 4H pressure z-score with a softer bounded tanh transform while keeping the 12-bar rank.
      inherit: baseline_no_4h_tier1_4h_large_trade_pressure_long
      include_patterns:
        - "4h_large_trade_pressure_12_stable_tanh"
      append_exclude_patterns:
        - "4h_large_trade_pressure_12_stable_zscore"
    baseline_no_4h_tier1_4h_large_trade_pressure_long_pressure_tanh_pair:
      description: Add bounded tanh pressure magnitudes for signed, 12-bar, and 24-bar 4H pressure; replaces only the unstable 12-bar z-score.
      inherit: baseline_no_4h_tier1_4h_large_trade_pressure_long
      include_patterns:
        - "4h_signed_large_trade_pressure_stable_tanh"
