      inherit: baseline_no_4h_tier1_4h_large_trade_pressure_long
      append_exclude_patterns:
        - "4h_vpt_zscore"
    baseline_no_4h_tier1_4h_large_trade_pressure_long_no_4h_vol_per_trade_log_zscore_only:
      description: Champion profile isolating the 4H vol-per-trade log z-score by removing it while keeping VPT z-score and whale flags.
      inherit: baseline_no_4h_tier1_4h_large_trade_pressure_long
      append_exclude_patterns:
