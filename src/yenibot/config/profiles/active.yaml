        - "4h_atr_14_pct"
        - "realized_vol_14"
        - "gk_vol_14"
        - "atr_14_pct"
    baseline_stable_plus_15m_flow_efficiency_rank:
      description: Stability control plus 15m flow-to-price response ranks/tanh, testing whether order flow actually moves price.
      inherit: baseline_stable_allow_intrahour_stable
      include_patterns:
        - "ih15_missing"
        - "ih15_coverage"
        - "ih15_flow_price_alignment_stable_rank"
        - "ih15_flow_price_alignment_stable_tanh"
        - "ih15_late_flow_price_alignment_stable_rank"
        - "ih15_late_flow_price_alignment_stable_tanh"
    baseline_plus_4h_bounded_whale_no_4h_tier1_no_1h_cvd_rate:
      description: Baseline control removing 1H cumulative CVD rate to test repeated tier-1 reversal risk.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1
      append_exclude_patterns:
        - "cvd_cumulative_rate_norm"
    baseline_plus_4h_bounded_whale_no_4h_tier1_bad_fold_guardrail_light:
      description: Baseline guardrail removing slow 4H bounded flow, raw 4H large-trade ratio, raw 4H pure volatility, and 1H CVD rate.
      inherit: baseline_plus_4h_bounded_whale_no_4h_tier1_no_slow_4h_bounded_flow
